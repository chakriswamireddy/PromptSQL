# Calcite gRPC sidecar configuration
spring.application.name=proxy-calcite-sidecar

# gRPC server
grpc.server.port=${GRPC_PORT:9095}
grpc.server.security.enabled=false

# Health / metrics (Spring Boot Actuator)
management.server.port=${METRICS_PORT:9096}
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Logging — structured JSON in production
logging.pattern.console=%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n

# Cache settings
calcite.parse-cache-size=${PARSE_CACHE_SIZE:1000}
calcite.rewrite-cache-size=${REWRITE_CACHE_SIZE:500}
calcite.rewrite-cache-ttl-seconds=${REWRITE_CACHE_TTL:300}

# JVM warm-up: Calcite JIT compilation pool size
calcite.worker-pool-size=${WORKER_POOL_SIZE:8}
