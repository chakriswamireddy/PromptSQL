name: audit-pipeline

on:
  push:
    paths:
      - 'apps/audit-clickhouse-sink/**'
      - 'apps/audit-worm-sink/**'
      - 'apps/audit-chain-verifier/**'
      - 'pkg/audit/**'
      - 'packages/audit-client/**'
      - 'migrations/0016_*.sql'
      - 'infra/clickhouse/**'
      - '.github/workflows/audit-pipeline.yml'
  pull_request:
    paths:
      - 'apps/audit-clickhouse-sink/**'
      - 'apps/audit-worm-sink/**'
      - 'apps/audit-chain-verifier/**'
      - 'pkg/audit/**'
      - 'packages/audit-client/**'

permissions:
  contents: read

jobs:
  # ── TypeScript audit-client ─────────────────────────────────────────────────
  audit-client-ts:
    name: audit-client (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/audit-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  # ── Go pkg/audit ────────────────────────────────────────────────────────────
  audit-client-go:
    name: pkg/audit (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pkg/audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  # ── ClickHouse sink ─────────────────────────────────────────────────────────
  audit-clickhouse-sink:
    name: audit-clickhouse-sink (Go)
    runs-on: ubuntu-latest
    services:
      kafka:
        image: apache/kafka:3.7.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          CLUSTER_ID: ci-cluster
        ports:
          - 9092:9092
      clickhouse:
        image: clickhouse/clickhouse-server:24.5
        ports:
          - 9000:9000
          - 8123:8123
    defaults:
      run:
        working-directory: apps/audit-clickhouse-sink
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Apply ClickHouse schema
        run: |
          until curl -sf http://localhost:8123/ping; do sleep 2; done
          curl -X POST http://localhost:8123/ --data-binary @../../infra/clickhouse/init.sql
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...
        env:
          CLICKHOUSE_DSN: clickhouse://localhost:9000/default
          KAFKA_BROKERS: localhost:9092

  # ── WORM sink ───────────────────────────────────────────────────────────────
  audit-worm-sink:
    name: audit-worm-sink (Go)
    runs-on: ubuntu-latest
    services:
      kafka:
        image: apache/kafka:3.7.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          CLUSTER_ID: ci-cluster
        ports:
          - 9092:9092
      minio:
        image: minio/minio:RELEASE.2024-06-04T19-20-08Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 10s
    defaults:
      run:
        working-directory: apps/audit-worm-sink
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...
        env:
          KAFKA_BROKERS: localhost:9092
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: audit-worm-ci
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin

  # ── Chain verifier ──────────────────────────────────────────────────────────
  audit-chain-verifier:
    name: audit-chain-verifier (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_DB: governance
          POSTGRES_USER: app
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d governance"
          --health-interval 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/audit-chain-verifier
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Run migrations
        run: |
          go run ../../scripts/migrate/main.go up
        env:
          DATABASE_URL: postgres://app:changeme@localhost:5432/governance
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...
        env:
          DATABASE_URL: postgres://app:changeme@localhost:5432/governance

  # ── Docker builds ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker builds
    runs-on: ubuntu-latest
    needs:
      - audit-clickhouse-sink
      - audit-worm-sink
      - audit-chain-verifier
    strategy:
      matrix:
        service:
          - audit-clickhouse-sink
          - audit-worm-sink
          - audit-chain-verifier
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: governance-platform/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
