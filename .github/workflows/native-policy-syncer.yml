name: native-policy-syncer

on:
  push:
    paths:
      - "apps/native-policy-syncer/**"
      - "pkg/connectors/**"
      - "migrations/0022_*"
      - ".github/workflows/native-policy-syncer.yml"
  pull_request:
    paths:
      - "apps/native-policy-syncer/**"
      - "pkg/connectors/**"
      - "migrations/0022_*"
      - ".github/workflows/native-policy-syncer.yml"

env:
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/governance-platform/native-policy-syncer

jobs:
  # ── Connector package unit tests ────────────────────────────────────────────
  test-connectors:
    name: pkg/connectors unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pkg/connectors

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: pkg/connectors/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -v -count=1 -timeout 60s

  # ── native-policy-syncer unit tests ─────────────────────────────────────────
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/native-policy-syncer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/native-policy-syncer/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -v -count=1 -timeout 60s

  # ── Integration tests (PostgreSQL + MySQL) ──────────────────────────────────
  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/native-policy-syncer

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app_migrator
          POSTGRES_PASSWORD: app_migrator
          POSTGRES_DB: governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_migrator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ptestpass"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/native-policy-syncer/go.sum

      - name: Install golang-migrate
        run: |
          curl -sSL https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin migrate

      - name: Apply all migrations
        env:
          DATABASE_URL: "postgres://app_migrator:app_migrator@localhost:5432/governance?sslmode=disable"
        run: |
          migrate -path ../../migrations -database "$DATABASE_URL" up

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: "postgres://app_migrator:app_migrator@localhost:5432/governance?sslmode=disable"
          TEST_MYSQL_DSN: "testuser:testpass@tcp(localhost:3306)/testdb"
          MULTI_DB_FEATURE_FLAG: "true"
        run: go test ./... -v -count=1 -timeout 180s -tags integration

  # ── Migration guard ─────────────────────────────────────────────────────────
  migration-guard:
    name: Migration 0022 idempotency guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app_migrator
          POSTGRES_PASSWORD: app_migrator
          POSTGRES_DB: governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_migrator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -sSL https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin migrate

      - name: Apply migrations (first pass)
        env:
          DATABASE_URL: "postgres://app_migrator:app_migrator@localhost:5432/governance?sslmode=disable"
        run: migrate -path migrations -database "$DATABASE_URL" up

      - name: Apply migrations (second pass — must be idempotent)
        env:
          DATABASE_URL: "postgres://app_migrator:app_migrator@localhost:5432/governance?sslmode=disable"
        run: migrate -path migrations -database "$DATABASE_URL" up

  # ── Equivalence corpus tests ─────────────────────────────────────────────────
  test-equivalence:
    name: Policy equivalence corpus
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pkg/connectors

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app_migrator
          POSTGRES_PASSWORD: app_migrator
          POSTGRES_DB: governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_migrator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ptestpass"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: pkg/connectors/go.sum

      - name: Run equivalence tests
        env:
          TEST_POSTGRES_DSN: "postgres://app_migrator:app_migrator@localhost:5432/governance?sslmode=disable"
          TEST_MYSQL_DSN: "testuser:testpass@tcp(localhost:3306)/testdb"
        run: go test ./equivalence/... -v -count=1 -timeout 120s -tags equivalence

  # ── Docker build & push ──────────────────────────────────────────────────────
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [test-connectors, test-unit, test-integration, migration-guard]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/native-policy-syncer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
