name: schema-crawler

on:
  push:
    paths:
      - "apps/schema-crawler/**"
      - "migrations/0018_*"
      - ".github/workflows/schema-crawler.yml"
  pull_request:
    paths:
      - "apps/schema-crawler/**"
      - "migrations/0018_*"
      - ".github/workflows/schema-crawler.yml"

env:
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/governance-platform/schema-crawler

jobs:
  # ── Unit & classifier tests ─────────────────────────────────────────────────
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/schema-crawler

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/schema-crawler/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests (classifier, differ)
        run: go test ./internal/classifier/... ./internal/differ/... ./internal/embedding/... -v -count=1

  # ── Integration tests ───────────────────────────────────────────────────────
  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/schema-crawler

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app_migrator
          POSTGRES_PASSWORD: app_migrator
          POSTGRES_DB: governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_migrator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/schema-crawler/go.sum

      - name: Install golang-migrate
        run: |
          curl -sSL https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin migrate

      - name: Apply all migrations
        env:
          DATABASE_URL: "postgres://app_migrator:app_migrator@localhost:5432/governance?sslmode=disable"
        run: |
          migrate -path ../../migrations -database "$DATABASE_URL" up

      - name: Run crawler integration tests
        env:
          TEST_DATABASE_URL: "postgres://app_migrator:app_migrator@localhost:5432/governance?sslmode=disable"
          # TEST_TARGET_DSN intentionally not set — integration tests skip live crawl.
        run: go test ./internal/crawler/... -v -count=1 -timeout 120s

  # ── Migration guard ─────────────────────────────────────────────────────────
  migration-guard:
    name: Migration idempotency guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app_migrator
          POSTGRES_PASSWORD: app_migrator
          POSTGRES_DB: governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_migrator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -sSL https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin migrate

      - name: Apply migrations (first pass)
        env:
          DATABASE_URL: "postgres://app_migrator:app_migrator@localhost:5432/governance?sslmode=disable"
        run: migrate -path migrations -database "$DATABASE_URL" up

      - name: Apply migrations (second pass — must be idempotent)
        env:
          DATABASE_URL: "postgres://app_migrator:app_migrator@localhost:5432/governance?sslmode=disable"
        run: migrate -path migrations -database "$DATABASE_URL" up

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, migration-guard]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/schema-crawler
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
