name: Deploy — prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "RC tag to promote to prod (e.g. v0.1.0-rc.1)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy-prod:
    name: Blue/green deploy to production (manual + 2-approver)
    runs-on: ubuntu-latest
    environment: prod   # GitHub environment requires 2 reviewers
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Cosign verify image signatures
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          for service in api-gateway pdp proxy schema-crawler; do
            cosign verify \
              --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/deploy-staging.yml@refs/tags/$IMAGE_TAG" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$ECR_REGISTRY/governance-platform/$service:$IMAGE_TAG"
          done

      - name: Terraform apply (prod — blue/green)
        working-directory: infra/terraform/environments/prod
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="image_tag=${{ inputs.image_tag }}" \
            -var="deployment_strategy=blue_green"

      - name: Automated rollback on SLO breach
        run: bash scripts/slo-rollback-guard.sh --env prod --tag "${{ inputs.image_tag }}"
