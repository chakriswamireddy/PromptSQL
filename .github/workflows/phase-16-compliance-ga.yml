name: Phase 16 — Compliance, Hardening & GA

on:
  push:
    branches: [main]
    paths:
      - "apps/compliance-service/**"
      - "packages/sdk-go/**"
      - "packages/sdk-ts/**"
      - "packages/sdk-python/**"
      - "migrations/0027_compliance_ga.up.sql"
      - "infra/helm/compliance-service/**"
      - ".github/workflows/phase-16-compliance-ga.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/compliance-service/**"
      - "packages/sdk-go/**"
      - "packages/sdk-ts/**"
      - "packages/sdk-python/**"
      - "migrations/0027_compliance_ga.up.sql"
      - "infra/helm/compliance-service/**"

env:
  GO_VERSION: "1.22"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: org/platform/compliance-service

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Migration guard ─────────────────────────────────────────────────────────
  migration-guard:
    name: Migration guard
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: governance_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
    steps:
      - uses: actions/checkout@v4
      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          mv migrate /usr/local/bin/
      - name: Apply all migrations
        run: |
          migrate -path migrations -database "postgres://postgres:postgres@localhost:5432/governance_test?sslmode=disable" up
      - name: Verify Phase 16 tables
        run: |
          psql -h localhost -U postgres -d governance_test -c "
            SELECT table_name FROM information_schema.tables
            WHERE table_schema = 'public'
              AND table_name IN (
                'compliance_modes','subprocessors','compliance_evidence',
                'access_reviews','access_review_entries','customer_health_scores',
                'gdpr_sar_requests','scim_tokens','billing_subscriptions'
              )
            ORDER BY table_name;" | grep -c compliance_modes
        env:
          PGPASSWORD: postgres

  # ── compliance-service unit tests ───────────────────────────────────────────
  compliance-service-test:
    name: compliance-service tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: governance_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/compliance-service/go.sum
      - name: Run migrations
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          mv migrate /usr/local/bin/
          migrate -path migrations -database "postgres://postgres:postgres@localhost:5432/governance_test?sslmode=disable" up
      - name: Test compliance-service
        working-directory: apps/compliance-service
        run: go test ./... -count=1 -race -timeout 120s
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/governance_test?sslmode=disable
          REDIS_ADDR: localhost:6379

  # ── Go SDK tests ─────────────────────────────────────────────────────────────
  sdk-go-test:
    name: Go SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: packages/sdk-go/go.sum
      - name: Test Go SDK
        working-directory: packages/sdk-go
        run: go test ./... -count=1 -race

  # ── TypeScript SDK tests ──────────────────────────────────────────────────────
  sdk-ts-test:
    name: TypeScript SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install dependencies
        working-directory: packages/sdk-ts
        run: pnpm install
      - name: Type check
        working-directory: packages/sdk-ts
        run: pnpm run lint
      - name: Run tests
        working-directory: packages/sdk-ts
        run: pnpm test
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: pnpm run build

  # ── Python SDK tests ──────────────────────────────────────────────────────────
  sdk-python-test:
    name: Python SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install SDK + dev deps
        working-directory: packages/sdk-python
        run: |
          pip install -e ".[dev]"
      - name: Run tests
        working-directory: packages/sdk-python
        run: pytest tests/ -v

  # ── Helm lint ────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.3
      - name: Lint compliance-service chart
        run: helm lint infra/helm/compliance-service/

  # ── Docker build ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [compliance-service-test, migration-guard]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: apps/compliance-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── SDK publish (main branch only, tagged releases) ────────────────────────
  publish-sdk-ts:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    needs: [sdk-ts-test]
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Build and publish
        working-directory: packages/sdk-ts
        run: |
          pnpm install
          pnpm run build
          pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-sdk-python:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    needs: [sdk-python-test]
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build wheel
        working-directory: packages/sdk-python
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist/

  # ── OpenAPI lint ─────────────────────────────────────────────────────────────
  openapi-lint:
    name: OpenAPI lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check OpenAPI spec exists
        run: |
          if [ -f "docs/openapi.yaml" ]; then
            docker run --rm -v "$(pwd):/work" stoplight/spectral:6 lint /work/docs/openapi.yaml
          else
            echo "No OpenAPI spec found at docs/openapi.yaml — skipping lint"
          fi

  # ── Compliance script smoke test ─────────────────────────────────────────────
  compliance-scripts:
    name: Compliance scripts smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate script syntax
        run: |
          bash -n scripts/compliance/generate-access-review.sh
          bash -n scripts/compliance/export-siem.sh
          bash -n scripts/compliance/collect-evidence.sh
          bash -n scripts/compliance/gdpr-erasure.sh
      - name: Dry-run access review generation
        run: bash scripts/compliance/generate-access-review.sh --dry-run
        env:
          GOVERNANCE_API_URL: http://localhost:8080
