name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Go lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
      - name: TS lint
        run: pnpm turbo run lint
      - name: Markdown lint
        run: npx markdownlint-cli2 "**/*.md" --ignore node_modules

  # ── Type-check ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck

  # ── Unit tests ──────────────────────────────────────────────────────────────
  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - name: Go unit tests
        run: go test -short -race ./...
      - name: TS unit tests
        run: pnpm turbo run test:unit

  # ── Build images ─────────────────────────────────────────────────────────────
  build-images:
    name: Build images
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-test]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api-gateway, pdp, proxy, schema-crawler]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}
          push: false
          tags: governance-platform/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── SAST (Semgrep) ──────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/golang
            p/typescript
            p/secrets

  # ── SCA + SBOM ──────────────────────────────────────────────────────────────
  supply-chain:
    name: SCA + SBOM
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json

  # ── No bare TODO/FIXME ───────────────────────────────────────────────────────
  no-bare-todos:
    name: No bare TODOs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for bare TODO/FIXME without ticket
        run: |
          if grep -rn --include="*.go" --include="*.ts" --include="*.tsx" \
            -E "//\s*(TODO|FIXME)\s*[^([]" .; then
            echo "ERROR: bare TODO/FIXME found. Add a ticket reference: TODO(TICK-123)"
            exit 1
          fi

  # ── License headers ──────────────────────────────────────────────────────────
  license-check:
    name: License check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SCA license scan (grype)
        uses: anchore/scan-action@v4
        with:
          path: .
          fail-build: true
          severity-cutoff: critical
