services:
  - name: api-gateway
    dir: apps/api-gateway
    language: go
    owner: platform-team
    oncall: platform-team
    runbook: docs/runbooks/api-gateway.md
    slo:
      availability: 99.9
      latency_p99_ms: 500
    ports:
      http: 8080
      grpc: 9090
      metrics: 9091

  - name: pdp
    dir: apps/pdp
    language: go
    owner: backend-lead
