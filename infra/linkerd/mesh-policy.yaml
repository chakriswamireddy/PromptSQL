# Namespace-level meshing + default deny policy.
# Apply BEFORE deploying any workloads into governance-platform namespace.
---
# Label the namespace to auto-inject Linkerd proxy sidecars.
apiVersion: v1
kind: Namespace
metadata:
  name: governance-platform
  labels:
    linkerd.io/inject: enabled
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
# Default deny for all unauthenticated traffic within the namespace.
# Callers must have an explicit ServerAuthorization entry.
apiVersion: policy.linkerd.io/v1beta1
kind: MeshTLSAuthentication
metadata:
  name: all-meshed
  namespace: governance-platform
spec:
  # Empty identities means: any valid SPIFFE identity issued by the cluster trust anchor.
  identities: ["*"]
---
# Default network policy: deny all ingress; services opt-in via ServerAuthorization.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: governance-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow Prometheus scraping from the monitoring namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: governance-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9093   # metrics port used by governance services
        - port: 4191   # Linkerd proxy admin/metrics
---
# Allow Linkerd control-plane to communicate with meshed pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-linkerd-control-plane
  namespace: governance-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
