apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: stateless
spec:
  template:
    metadata:
      labels:
        governance.io/pool: stateless
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: governance-default

      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]  # prefer spot; fall back on-demand
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["m7i", "m6i", "m5", "c7i", "c6i"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["xlarge", "2xlarge", "4xlarge"]

      # Workloads that are NOT tolerant of termination go on system node group,
      # not here. Stateless pods should all handle SIGTERM.
      taints: []

  # Consolidation: scale-in aggressively when underutilized.
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s
    # expireAfter: 168h  # rotate nodes weekly for security patches

  limits:
    cpu: "200"
    memory: "800Gi"

  weight: 10
