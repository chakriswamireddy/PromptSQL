apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: governance-default
  annotations:
    governance.io/managed-by: "terraform-helm"
spec:
  # AMI family — Bottlerocket is hardened and minimal; preferred for production.
  amiFamily: Bottlerocket

  # Instance profile used by Karpenter-provisioned nodes.
  # Populated by Terraform output: node_instance_profile_arn
  instanceProfile: governance-prod-node-profile

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: governance-prod  # must match cluster tag

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: governance-prod

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 4Gi
        volumeType: gp3
        encrypted: true
    - deviceName: /dev/xvdb  # data volume for container images / overlayfs
      ebs:
        volumeSize: 80Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true

  tags:
    Environment: prod
    ManagedBy: karpenter
    Project: governance-platform

  # IMDSv2 required — no IMDSv1.
  metadataOptions:
    httpTokens: required
    httpPutResponseHopLimit: 1
    httpEndpoint: enabled
