apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "pdp.fullname" . }}
  labels:
    {{- include "pdp.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "pdp.selectorLabels" . | nindent 6 }}
