apiVersion: v1
kind: Service
metadata:
  name: {{ include "region-router.fullname" . }}
  labels:
    {{- include "region-router.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "region-router.selectorLabels" . | nindent 4 }}
