replicaCount: 2

image:
  repository: governance-platform/live-feed-broadcaster
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  metricsPort: 9105

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

pdb:
  enabled: true
  minAvailable: 1

env:
  ENVIRONMENT: production
  KAFKA_BROKERS: kafka:9092
  KAFKA_TOPIC_ACCESS: audit.access.production
  KAFKA_TOPIC_POLICY: audit.policy.production
  KAFKA_CONSUMER_GROUP: live-feed-broadcaster
  LISTEN_ADDR: ":8080"
  METRICS_ADDR: ":9105"
  MAX_CONN_PER_USER: "5"
  DROP_BUFFER_SIZE: "256"
  PING_INTERVAL: "30s"
  OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
  UNLEASH_URL: http://unleash:4242/api

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""
