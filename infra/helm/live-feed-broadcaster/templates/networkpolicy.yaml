apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "live-feed-broadcaster.fullname" . }}
spec:
  podSelector:
    matchLabels: {{ include "live-feed-broadcaster.labels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
        - port: {{ .Values.service.metricsPort }}
  egress:
    - ports:
        - port: 9092  # Kafka
        - port: 4242  # Unleash
        - port: 4317  # OTel collector
