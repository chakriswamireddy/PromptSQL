apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "anomaly-detector.fullname" . }}
  labels:
    {{- include "anomaly-detector.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "anomaly-detector.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus scraping.
    - ports:
        - port: 9109
    # Allow api-gateway to forward risk requests.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - port: 8090
  egress:
    # PostgreSQL
    - ports:
        - port: 5432
    # Redis
    - ports:
        - port: 6379
    # Kafka
    - ports:
        - port: 9092
    # OTel collector
    - ports:
        - port: 4317
    # Unleash
    - ports:
        - port: 4242
