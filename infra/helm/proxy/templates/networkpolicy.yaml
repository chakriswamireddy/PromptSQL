{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "proxy.fullname" . }}
  labels:
    {{- include "proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "proxy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # PG wire port: allow only from authorised namespaces.
    - from:
        {{- range .Values.networkPolicy.allowedNamespaceLabels }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        - port: {{ .Values.service.proxyPort }}
          protocol: TCP
    # Prometheus scrape.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: "monitoring"
      ports:
        - port: {{ .Values.service.metricsPort }}
          protocol: TCP
    # Health probes from kubelet.
    - ports:
        - port: {{ .Values.service.httpPort }}
          protocol: TCP
  egress:
    # Allow all outbound (PDP gRPC, Redis, backend DB, OTel collector).
    - {}
{{- end }}
