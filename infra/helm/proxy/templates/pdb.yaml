apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "proxy.fullname" . }}
  labels:
    {{- include "proxy.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "proxy.selectorLabels" . | nindent 6 }}
