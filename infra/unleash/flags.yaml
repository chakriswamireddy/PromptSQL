# Unleash feature flag registry — single source of truth.
# Apply via: unleash-import --file infra/unleash/flags.yaml
# Every new capability MUST be added here before the code lands in main.

version: 1
features:

  # Phase 0 — Foundation (infrastructure only; no gating logic needed)
  - name: api-gateway
    description: API Gateway service is active
    enabled: true
    strategies:
      - name: default

  # Phase 1 — Control Plane Database
  - name: control-plane-db
    description: Phase 1 database schema and RLS active
    enabled: false
    strategies:
      - name: default

  # Phase 2 — Authentication & Session
  - name: authn-session
    description: Ed25519 JWT auth and SessionContext enforcement
    enabled: false
    strategies:
      - name: default

  # Phase 3 — PDP V1
  - name: pdp-v1
    description: Policy Decision Point V1 (Conditions DSL, gRPC)
    enabled: false
    strategies:
      - name: default

  # Phase 4 — Admin Console & Simulator
  - name: admin-console
    description: Next.js admin console and policy simulator
    enabled: false
    strategies:
      - name: default

  # Phase 5 — Audit Pipeline
  - name: audit-pipeline
    description: Kafka → ClickHouse → WORM S3 audit pipeline
    enabled: false
    strategies:
      - name: default

  # Phase 6 — PEP PostgreSQL Proxy
  - name: pep-postgres-proxy
    description: Go wire proxy + Calcite sidecar SQL rewrite
    enabled: false
    strategies:
      - name: default

  # Phase 7 — Schema Catalog & Crawler
  - name: schema-catalog
    description: information_schema crawler, embeddings, classification
    enabled: false
    strategies:
      - name: default

  # Phase 8 — Permission-Aware Retrieval
  - name: permission-aware-retrieval
    description: AllowedSnapshot RAG, prompt injection defenses, LiteLLM routing
    enabled: false
    strategies:
      - name: default

  # Phase 9 — AI PAP Graph
  - name: ai-pap-graph
    description: LangGraph PAP, constrained decoding, human approval
    enabled: false
    strategies:
      - name: default

  # Phase 10 — AI PEP Graph
  - name: ai-pep-graph
    description: LangGraph PEP, AST-first SQL, chat UX
    enabled: false
    strategies:
      - name: default

  # Phase 11 — Multi-Database Support
  # Parent flag: gates ALL Phase 11 features.  All per-engine flags below are
  # checked in addition to this parent flag — enabling an engine flag without
  # this parent flag has no effect.
  - name: multi-db
    description: "Phase 11: multi-database expansion — parent gate for all engine connectors"
    enabled: false
    strategies:
      - name: default

  # Per-engine flags allow gradual rollout engine-by-engine.
  - name: multi-db-mysql
    description: "Phase 11: MySQL 8.0+ connector (Wave A)"
    enabled: false
    strategies:
      - name: default

  - name: multi-db-sqlserver
    description: "Phase 11: SQL Server 2019+ / Azure SQL connector (Wave A)"
    enabled: false
    strategies:
      - name: default

  - name: multi-db-oracle
    description: "Phase 11: Oracle 19c+ connector with VPD enforcement (Wave A)"
    enabled: false
    strategies:
      - name: default

  - name: multi-db-snowflake
    description: "Phase 11: Snowflake connector — Row Access Policies + DDM (Wave B)"
    enabled: false
    strategies:
      - name: default

  - name: multi-db-bigquery
    description: "Phase 11: BigQuery connector — authorized views + Policy Tags stub (Wave B)"
    enabled: false
    strategies:
      - name: default

  - name: multi-db-databricks
    description: "Phase 11: Databricks Unity Catalog connector — row filters + column masks (Wave B)"
    enabled: false
    strategies:
      - name: default

  - name: multi-db-mongodb
    description: "Phase 11: MongoDB 5.0+ connector — aggregation pipeline injection (special case)"
    enabled: false
    strategies:
      - name: default

  # Legacy alias retained for any callers using the old name.
  - name: multi-database
    description: "Phase 11: deprecated alias for multi-db — use multi-db instead"
    enabled: false
    strategies:
      - name: default

  # Phase 12 — Real-Time Event Stream
  - name: realtime-stream
    description: WebSocket live feed, webhooks, DLQ, saved-query scheduler
    enabled: false
    strategies:
      - name: default

  # Phase 13 — Anomaly Detection & Risk ABAC
  - name: anomaly-detection
    description: Flink baseline, riskScore ABAC variable
    enabled: false
    strategies:
      - name: default

  # Phase 14 — Auto-Response & Break-Glass
  - name: auto-response
    description: Playbooks, step-up MFA, mid-flight masking, break-glass
    enabled: false
    strategies:
      - name: default

  # Phase 15 — Scale-Out
  - name: scale-multiregion
    description: EKS, Linkerd, HA, active-active reads, DR drill
    enabled: false
    strategies:
      - name: default

  # Phase 16 — Compliance & GA
  - name: compliance-ga
    description: SOC 2 Type II evidence, pentest, SDKs, pricing, GA launch
    enabled: false
    strategies:
      - name: default
