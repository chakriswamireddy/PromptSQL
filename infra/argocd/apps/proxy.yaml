apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: proxy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: governance
  source:
    repoURL: https://github.com/governance-platform/infra
    targetRevision: main
    path: infra/helm/proxy
    helm:
      valueFiles:
        - ../../values/proxy/{{ .Values.environment }}.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: governance-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
