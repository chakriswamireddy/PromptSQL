apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: governance-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Notify SRE on sync failures.
    notifications.argoproj.io/subscribe.on-sync-failed.slack: sre-alerts
spec:
  project: governance

  source:
    repoURL: https://github.com/governance-platform/infra
    targetRevision: main
    path: infra/argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
